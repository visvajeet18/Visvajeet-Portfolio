    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --accent-blue: #3b82f6;
            --accent-teal: #10b981;
            --accent-purple: #8b5cf6;
            --text-heading: #f3f4f6;
            --text-body: #9ca3af;
            --border-light: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-body);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            overflow: hidden;
        }

        /* Floating Cyber Nodes */
        .cyber-node {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px 1px var(--accent-blue);
            animation: floatNode 20s infinite linear;
            opacity: 0.3;
        }

        @keyframes floatNode {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(100px, 100px) rotate(120deg); }
            66% { transform: translate(-50px, 200px) rotate(240deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
            position: relative;
            z-index: 2;
        }

        .page-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .page-title {
            color: var(--text-heading);
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .page-subtitle {
            color: var(--accent-teal);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .no-memories-placeholder {
            grid-column: 1 / -1;
            text-align: center;
            padding: 6rem 2rem;
            background: rgba(17, 24, 39, 0.4);
            backdrop-filter: blur(10px);
            border: 1px dashed var(--border-light);
            border-radius: 24px;
            animation: fadeIn 1s ease;
        }

        .memory-card.visible {
            opacity: 1 !important;
            transform: translateY(0) !important;
            visibility: visible !important;
        }

        body.admin-mode-active .admin-only-reset {
            display: block !important;
        }
    </style>
</head>

    <!-- Emergency Admin Reset (Only visible in Admin Mode via CSS) -->

            class="admin-only-reset" 
            style="display: none; position: fixed; top: 20px; right: 20px; z-index: 9999; background: var(--admin-danger); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px rgba(255,0,85,0.4);">
        FORCE RESET PAGE
    </button>

    <script>
        // Lens Effect Script
        const lens = document.getElementById('lensOverlay');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            lens.style.setProperty('--x', x + '%');
            lens.style.setProperty('--y', y + '%');
        });

        // Emergency Reset for "Ghost" Items
        // If you see items that shouldn't be there, run 'portfolio.resetPage()' in console
        // or click the secret button below in Admin Mode.
        window.addEventListener('load', () => {
            if (window.portfolio) {
                window.portfolio.resetPage = function() {
                    if (confirm("This will permanently clear all saved edits for THIS page. Continue?")) {
                        localStorage.removeItem(`portfolio_content_${window.location.pathname}`);
                        location.reload();
                    }
                };
            }
        });
    </script>
