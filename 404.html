<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 // Route Not Found</title>
    
    <!-- SEO Meta Tags for 404 Pages -->
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://visvajeet.netlify.app/404.html" />

    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-heading: #f3f4f6;
            --text-body: #9ca3af;
            --border-light: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-body);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Cyber Grid Background */
        .ambient-bg {
            position: absolute;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            overflow: hidden;
        }

        .cyber-grid {
            position: absolute;
            bottom: -50vh;
            left: -50vw;
            width: 200vw;
            height: 200vh;
            background-image:
                linear-gradient(rgba(239, 68, 68, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(600px) rotateX(60deg);
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: perspective(600px) rotateX(60deg) translateY(0);
            }
            100% {
                transform: perspective(600px) rotateX(60deg) translateY(50px);
            }
        }

        .error-container {
            max-width: 500px;
            text-align: center;
            padding: 3rem;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.15);
            animation: pulseGlow 4s infinite alternate;
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 30px rgba(239, 68, 68, 0.1);
                border-color: rgba(239, 68, 68, 0.15);
            }
            100% {
                box-shadow: 0 0 50px rgba(239, 68, 68, 0.25);
                border-color: rgba(239, 68, 68, 0.35);
            }
        }

        .glitch-code {
            font-size: 6rem;
            font-weight: 800;
            color: var(--accent-red);
            margin: 0;
            letter-spacing: -2px;
            position: relative;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        .error-title {
            color: var(--text-heading);
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 1rem 0 1.5rem;
        }

        .error-message {
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn-home {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="ambient-bg">
        <div class="cyber-grid"></div>
    </div>

    <div class="error-container">
        <h1 class="glitch-code">404</h1>
        <h2 class="error-title">Route Not Found</h2>
        <p class="error-message">
            The coordinates you requested could not be resolved in this system architecture. It may have been relocated or purged.
        </p>
        <a href="index.html" class="btn-home">Return to Home</a>
    </div>

</body>
</html>
